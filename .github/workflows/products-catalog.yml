name: Build Products Catalog

on:
  push:
    branches: [main]
    paths:
      - "products/**"
      - ".github/workflows/products-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate products catalog
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from html.parser import HTMLParser

          root = Path("products")
          out_path = root / "catalog.json"

          class MetaParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.meta = {}
                  self.title = ""
                  self._in_title = False

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if tag.lower() == "meta":
                      key = attrs.get("name") or attrs.get("property")
                      value = attrs.get("content", "").strip()
                      if key and value:
                          self.meta[key.lower()] = value
                  elif tag.lower() == "title":
                      self._in_title = True

              def handle_endtag(self, tag):
                  if tag.lower() == "title":
                      self._in_title = False

              def handle_data(self, data):
                  if self._in_title:
                      self.title += data

          products = []
          for html_path in sorted(root.glob("*/index.html")):
              slug = html_path.parent.name
              if slug == "index":
                  continue

              html = html_path.read_text(encoding="utf-8")
              parser = MetaParser()
              parser.feed(html)

              title = parser.meta.get("og:title") or parser.title.strip()
              blurb = parser.meta.get("product:blurb") or parser.meta.get("description")
              image = parser.meta.get("product:image") or parser.meta.get("og:image")
              platforms = parser.meta.get("product:platforms", "")

              if image and not image.startswith(("http://", "https://", "/")):
                  image = f"/products/{slug}/{image.lstrip('./')}"

              support_path = root / slug / "support" / "index.html"
              support_url = f"/products/{slug}/support/" if support_path.exists() else ""

              products.append({
                  "slug": slug,
                  "title": title or slug.replace("-", " ").title(),
                  "blurb": blurb or "Product details coming soon.",
                  "image": image or "/assets/img/og-default.svg",
                  "url": f"/products/{slug}/",
                  "support_url": support_url,
                  "platforms": platforms
              })

          out_path.write_text(json.dumps(products, indent=2) + "\\n", encoding="utf-8")
          PY

      - name: Commit catalog if changed
        run: |
          if git diff --quiet -- products/catalog.json; then
            echo "No catalog changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add products/catalog.json
            git commit -m "Update products catalog"
            git push
          fi
